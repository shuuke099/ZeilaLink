name: Deploy ZeilaLink

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            echo "=============================="
            echo "Starting ZeilaLink Deployment"
            echo "=============================="

            cd ~/apps/ZeilaLink

            # The frontend proxies /api to the backend on this same server.
            # Export these values for both `next build` and the PM2 restart.
            export INTERNAL_API_ORIGIN="http://127.0.0.1:7000"
            export NEXT_PUBLIC_API_URL="/api"

            echo "Pull latest code..."
            git pull origin main

            echo "Install dependencies..."
            pnpm install --frozen-lockfile

            echo "Run Prisma migrations..."
            cd backend
            pnpm prisma migrate deploy
            cd ..

            echo "Build application..."
            pnpm build

            echo "Restart PM2..."
            pm2 restart ecosystem.config.js --update-env

            echo "Save PM2..."
            pm2 save

            echo "Check restarted services..."
            wait_for_service() {
              service_name="$1"
              service_url="$2"

              for attempt in $(seq 1 12); do
                if curl -fsS "$service_url" > /dev/null; then
                  echo "$service_name is healthy."
                  return 0
                fi

                echo "Waiting for $service_name ($attempt/12)..."
                sleep 5
              done

              echo "$service_name did not become healthy."
              pm2 status
              pm2 logs "$service_name" --lines 100 --nostream
              return 1
            }

            wait_for_service "zeilalink-backend" "http://127.0.0.1:7000/health"
            wait_for_service "zeilalink-frontend" "http://127.0.0.1:3000/"

            echo ""
            echo "Deployment completed successfully."
